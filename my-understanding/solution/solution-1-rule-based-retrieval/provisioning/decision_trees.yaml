  - knowledge_id: decision_tree_08_no_pppoe_reset_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Decision Tree 8: Params Applied (200 OK), No PPPOE_RESET Event"
    statement: >
      ACS successfully applied parameters to CPE (200 OK received), but
      PPPOE_RESET event never arrived. Service remains UNPROVISIONED and
      LOCKED. Resource operationalSubState is PENDING_PPPOE_RESTART.
      PPPOE_RESET should arrive approximately 5 seconds after 200 OK from CPE.
      Root cause: parameters were applied but CPE did not send PPPOE_RESET_EVENT
      (or event was lost). Without this event, post-provisioning actions cannot proceed.
      Resolution: Investigate device-side PPPoE restart behavior. May need manual
      reprovisioning. Check event infrastructure (MQ) for issues.
    preconditions:
      - "cpeId is present"
      - "managementSystem == RDK"
      - "serviceState == UNPROVISIONED"
      - "resourceOperationalState == UNKNOWN"
      - "resourceOperationalSubState == PENDING_PPPOE_RESTART"
      - "serviceLockReferenceId is present (service is LOCKED)"
      - "ACS response was 200 OK"
    expected_outcome: "Investigate device PPPoE restart. Check MQ. May need manual reprovisioning."
    source_file: ProvisioningManagerInvestigator_Instruction.md
    source_section: "Diagnostic Decision Trees > Decision Tree 8"
