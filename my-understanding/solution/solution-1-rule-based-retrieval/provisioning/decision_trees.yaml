  - knowledge_id: decision_tree_01_no_resource_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Decision Tree 1: Service with No Resource"
    statement: >
      Pre-provisioning was done without a supporting resource. Natco created the
      service beforehand; customer will be linked later. State indicators: cpeId is
      null or missing, managementSystem is UNKNOWN, serviceState is UNPROVISIONED.
      Root cause: supportingResources block was NOT provided in the PUT AC API request.
      Resolution: Link service with resource using PATCH AC API or PATCH RI API.
      Once linked and device comes online, provisioning will trigger automatically.
    preconditions:
      - "cpeId is null or missing"
      - "managementSystem == UNKNOWN"
      - "serviceState == UNPROVISIONED"
    expected_outcome: "Link service with resource via PATCH AC API or PATCH RI API."
    source_file: ProvisioningManagerInvestigator_Instruction.md
    source_section: "Diagnostic Decision Trees > Decision Tree 1"
    source_kind: prompt_extraction
    tenant_scope: [all]
    environment_scope: [production, staging]
    version: "1.0"
    confidence: 0.95
    status: active
    tags: [decision_tree, no_resource, unknown, unprovisioned]
    related_to:
