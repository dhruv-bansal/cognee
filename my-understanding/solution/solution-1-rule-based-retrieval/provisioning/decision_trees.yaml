  - knowledge_id: decision_tree_03_happy_path_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Decision Tree 3: Happy Path - Service with Online Resource"
    statement: >
      Everything worked correctly. State indicators: cpeId present,
      managementSystem RDK, serviceState PROVISIONED, serviceStatus ENABLED,
      resourceState ACTIVE, resourceSubState PROVISIONED, operationalState ENABLED,
      operationalSubState ONLINE, serviceLockReferenceId null (no lock).
      All provisioning parameters should have status APPLIED.
    preconditions:
      - "cpeId is present"
      - "managementSystem == RDK"
      - "serviceState == PROVISIONED"
      - "resourceState == ACTIVE"
      - "resourceOperationalState == ENABLED"
      - "resourceOperationalSubState == ONLINE"
      - "serviceLockReferenceId is null"
    expected_outcome: "No issue. This is the expected successful state."
    source_file: ProvisioningManagerInvestigator_Instruction.md
