        edge_type: REQUIRES_STATE
      - target: tool_contract_get_service_details_v1
        edge_type: REQUIRES_TOOL

  - knowledge_id: decision_tree_02_resource_not_online_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Decision Tree 2: Service with Resource Not Online (RDK)"
    statement: >
      Service has a resource assigned but device never came online (boot event
      not received). State indicators: cpeId present, managementSystem RDK,
      serviceState UNPROVISIONED, resourceState PENDING_ACTIVE/ASSIGNED,
      operationalState UNKNOWN, operationalSubState PENDING_UNKNOWN.
      Root cause: boot/online event was NOT received from CPE. Post-provisioning
      was never triggered (requires device online).
      Resolution: Wait for device to come online. Investigate device
      connectivity/power issues. Check device is configured to connect to RDK backend.
    preconditions:
      - "cpeId is present"
      - "managementSystem == RDK"
      - "serviceState == UNPROVISIONED"
      - "resourceState == PENDING_ACTIVE"
      - "resourceOperationalState == UNKNOWN"
      - "resourceOperationalSubState == PENDING_UNKNOWN"
      - "device was NEVER online (no online event in logs)"
    expected_outcome: "Investigate device connectivity. Wait for device to come online."
    source_file: ProvisioningManagerInvestigator_Instruction.md
    source_section: "Diagnostic Decision Trees > Decision Tree 2"
