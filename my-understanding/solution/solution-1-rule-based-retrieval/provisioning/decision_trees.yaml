  - knowledge_id: decision_tree_07_service_locked_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Decision Tree 7: Provisioning Never Occurred - Service Locked"
    statement: >
      Device is online but provisioning never started because service was locked.
      State indicators: cpeId present, managementSystem RDK, serviceState
      UNPROVISIONED, operationalState ENABLED, operationalSubState ONLINE,
      serviceLockReferenceId PRESENT (not null).
      Root cause: service was already locked by another process. Common cause is
      repeated provisioning requests where first request hasn't completed.
      Lock types that block: DELAYED_RETRY_PROCESSING,
      DEPROVISIONING_DELAYED_RETRY_PROCESSING, DISASSOCIATE_REQUEST_PROCESSING.
      Resolution: Wait for existing lock to be released (typical: seconds to minutes).
      If lock is stale (stuck), manually release it.
    preconditions:
      - "cpeId is present"
      - "managementSystem == RDK"
      - "serviceState == UNPROVISIONED"
      - "resourceOperationalState == ENABLED"
      - "resourceOperationalSubState == ONLINE"
      - "serviceLockReferenceId is NOT null"
    expected_outcome: "Wait for lock release or manually release stale lock."
    source_file: ProvisioningManagerInvestigator_Instruction.md
    source_section: "Diagnostic Decision Trees > Decision Tree 7"
    source_kind: prompt_extraction
