items:

  - knowledge_id: decision_tree_master_diagnostic_flow_v1
    domain: provisioning
    knowledge_type: decision_tree
    title: "Master Diagnostic Flow: Key Diagnostic Questions"
    statement: >
      Entry point for all provisioning diagnostics. Follow this sequence:

      1. Is cpeId present?
         - NO -> Scenario #1 (No Resource)
         - YES -> Continue

      2. What is managementSystem?
         - LEGACY (HDM/RINO/SNMP) -> Service should be PROVISIONED (sync flow)
         - NONDTROUTER -> Service should be PROVISIONED (immediate activation)
         - UNKNOWN -> Service is UNPROVISIONED, waiting for device registration
         - RDK -> Continue to step 3

      3. What is serviceState?
         - PROVISIONED -> Check if home created. Yes=Happy Path(#3), No=Home Not Created(#10)
         - PROVISIONING_FAILED -> Check TransactionJob in MongoDB. Exists=#6(ACS Failed), Not exists=#12(Op Mapping)
         - UNPROVISIONED -> Continue to step 4

      4. What is resourceOperationalState?
         - UNKNOWN -> Check operationalSubState.
           PENDING_PPPOE_RESTART=#9(Awaiting PPPOE_RESET).
           PENDING_UNKNOWN -> Was device ever online? Yes=#5(Offline During), No=#2(Never Online)
         - ENABLED/ONLINE -> Continue to step 5

      5. Is serviceLockReferenceId present?
         - YES -> Scenario #7 (Service Locked)
         - NO -> Check TransactionJob status and logs.
           PARTIAL_SUCCESS=#13, ACS errors=#6, Exceptions/NPE=#8
    preconditions:
      - "serviceId is available"
      - "service details have been fetched"
    expected_outcome: "Agent identifies the correct diagnostic scenario from #1-#13."
    source_file: ProvisioningManagerInvestigator_Instruction.md
    source_section: "Quick Reference State Combinations > Key Diagnostic Questions Flow"
