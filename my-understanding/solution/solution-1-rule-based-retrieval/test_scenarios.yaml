---
# Test scenarios for retrieval accuracy evaluation.
# Each scenario defines a user problem and the expected "diagnostic package"
# that correct retrieval should assemble.
#
# The key question: given this user input + session context, does the system
# retrieve the right knowledge items (and NOT the wrong ones)?

scenarios:

  - scenario_id: ts_01_no_cpe_id
    title: "Service stuck in UNPROVISIONED, no device linked"
    user_input: "Service 12345 is stuck in UNPROVISIONED state. Can you check what's going on?"
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
      service_id: "12345"
    mock_tool_responses:
      get_service_details_by_service_id:
        serviceState: UNPROVISIONED
        status: ENABLED
        cpeId: null
        managementSystem: UNKNOWN
        serviceLockReferenceId: null
    expected_retrieved:
      decision_tree: decision_tree_01_no_resource_v1
      required_states:
        - state_def_service_unprovisioned_v1
      required_tools:
        - tool_contract_get_service_details_v1
      scope_validation:
        - scope_rule_onebb_provisioning_v1
        - scope_rule_required_service_id_v1
    should_not_retrieve:
      - decision_tree_08_no_pppoe_reset_v1
      - decision_tree_07_service_locked_v1
      - failure_pattern_stale_lock_v1
    expected_agent_action: "Advise linking service to a resource via PATCH AC/RI API."

  - scenario_id: ts_02_device_never_online
    title: "Service UNPROVISIONED, device assigned but never came online"
    user_input: "Customer's broadband service 67890 isn't working. It says unprovisioned."
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
      service_id: "67890"
    mock_tool_responses:
      get_service_details_by_service_id:
        serviceState: UNPROVISIONED
        status: ENABLED
        cpeId: "abc123"
        managementSystem: RDK
        serviceLockReferenceId: null
      get_resource_by_cpe_id:
        resourceState: PENDING_ACTIVE
        resourceSubState: ASSIGNED
        operationalState: UNKNOWN
        operationalSubState: PENDING_UNKNOWN
    expected_retrieved:
      decision_tree: decision_tree_02_resource_not_online_v1
      required_states:
        - state_def_service_unprovisioned_v1
        - state_def_resource_pending_active_assigned_v1
        - state_def_resource_op_unknown_pending_unknown_v1
      required_tools:
        - tool_contract_get_service_details_v1
        - tool_contract_get_resource_v1
      required_evidence:
        - evidence_pattern_check_online_event_v1
    should_not_retrieve:
      - decision_tree_08_no_pppoe_reset_v1
      - decision_tree_07_service_locked_v1
      - failure_pattern_stale_lock_v1
    expected_agent_action: "Investigate device connectivity. Device never came online."

  - scenario_id: ts_03_happy_path
    title: "Everything is fine, provisioned and online"
    user_input: "Can you check service 11111? Customer says it should be working but wants confirmation."
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
      service_id: "11111"
    mock_tool_responses:
      get_service_details_by_service_id:
        serviceState: PROVISIONED
        status: ENABLED
        cpeId: "xyz789"
        managementSystem: RDK
        serviceLockReferenceId: null
      get_resource_by_cpe_id:
        resourceState: ACTIVE
        resourceSubState: PROVISIONED
        operationalState: ENABLED
        operationalSubState: ONLINE
    expected_retrieved:
      decision_tree: decision_tree_03_happy_path_v1
      required_states:
        - state_def_service_provisioned_v1
        - state_def_resource_active_provisioned_v1
        - state_def_resource_op_enabled_online_v1
      required_tools:
        - tool_contract_get_service_details_v1
        - tool_contract_get_resource_v1
    should_not_retrieve:
      - decision_tree_01_no_resource_v1
      - decision_tree_08_no_pppoe_reset_v1
      - failure_pattern_stale_lock_v1
      - failure_pattern_pppoe_missing_v1
    expected_agent_action: "Confirm service is correctly provisioned and operational."

  - scenario_id: ts_04_service_locked
    title: "Service stuck, device online, locked by another process"
    user_input: "Service 22222 provisioning seems stuck. Device shows online but nothing happened."
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
      service_id: "22222"
    mock_tool_responses:
      get_service_details_by_service_id:
        serviceState: UNPROVISIONED
        status: ENABLED
        cpeId: "cpe456"
        managementSystem: RDK
        serviceLockReferenceId: "lock-ref-99887"
      get_resource_by_cpe_id:
        resourceState: PENDING_ACTIVE
        resourceSubState: ASSIGNED
        operationalState: ENABLED
        operationalSubState: ONLINE
    expected_retrieved:
      decision_tree: decision_tree_07_service_locked_v1
      required_states:
        - state_def_service_unprovisioned_v1
        - state_def_resource_op_enabled_online_v1
      required_tools:
        - tool_contract_get_service_details_v1
        - tool_contract_get_resource_v1
        - tool_contract_check_provisioning_logs_v1
      required_evidence:
        - evidence_pattern_lock_issues_v1
      required_failures:
        - failure_pattern_stale_lock_v1
    should_not_retrieve:
      - decision_tree_01_no_resource_v1
      - decision_tree_03_happy_path_v1
      - decision_tree_08_no_pppoe_reset_v1
      - failure_pattern_pppoe_missing_v1
    expected_agent_action: "Identify lock holder. Wait or manually release stale lock."

  - scenario_id: ts_05_pppoe_stuck
    title: "ACS succeeded but PPPOE_RESET never arrived"
    user_input: "Service 33333 - params were applied to CPE but service is still UNPROVISIONED and locked."
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
      service_id: "33333"
    mock_tool_responses:
      get_service_details_by_service_id:
        serviceState: UNPROVISIONED
        status: ENABLED
        cpeId: "cpe789"
        managementSystem: RDK
        serviceLockReferenceId: "lock-ref-55443"
      get_resource_by_cpe_id:
        resourceState: PENDING_ACTIVE
        resourceSubState: ASSIGNED
        operationalState: UNKNOWN
        operationalSubState: PENDING_PPPOE_RESTART
    expected_retrieved:
      decision_tree: decision_tree_08_no_pppoe_reset_v1
      required_states:
        - state_def_service_unprovisioned_v1
        - state_def_resource_op_pending_pppoe_restart_v1
      required_tools:
        - tool_contract_get_service_details_v1
        - tool_contract_get_resource_v1
        - tool_contract_check_provisioning_logs_v1
      required_evidence:
        - evidence_pattern_pppoe_not_received_v1
      required_failures:
        - failure_pattern_pppoe_missing_v1
    should_not_retrieve:
      - decision_tree_01_no_resource_v1
      - decision_tree_03_happy_path_v1
      - decision_tree_07_service_locked_v1
      - failure_pattern_stale_lock_v1
    expected_agent_action: "Investigate device PPPoE restart. Check MQ. Manual reprovisioning."

  - scenario_id: ts_06_out_of_scope
    title: "User asks about WiFi performance, not provisioning"
    user_input: "My WiFi speed is slow on the 5GHz band. Can you check?"
    session_context:
      tenant_id: all
      environment: production
      domain: null
    expected_retrieved:
      scope_validation:
        - scope_rule_onebb_provisioning_v1
    should_not_retrieve:
      - decision_tree_01_no_resource_v1
      - decision_tree_02_resource_not_online_v1
      - decision_tree_03_happy_path_v1
      - tool_contract_get_service_details_v1
    expected_agent_action: "Politely refuse. This is not a provisioning diagnostic issue."

  - scenario_id: ts_07_no_service_id
    title: "In-scope question but no service ID provided"
    user_input: "Our customer's broadband provisioning is failing. Can you help?"
    session_context:
      tenant_id: all
      environment: production
      domain: provisioning
    expected_retrieved:
      scope_validation:
        - scope_rule_onebb_provisioning_v1
        - scope_rule_required_service_id_v1
    should_not_retrieve:
      - decision_tree_01_no_resource_v1
      - decision_tree_02_resource_not_online_v1
      - tool_contract_get_resource_v1
    expected_agent_action: "Ask user for serviceId before proceeding."
